<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sueldos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ESTILOS VINTAGE PROFESIONAL --- */
        :root {
            --fondo: #f4f1ea;        /* Tono crema vintage */
            --texto: #1e3a5a;        /* Azul petróleo */
            --tarjeta: #ffffff;      /* Blanco roto */
            --borde: #dcd6cc;        /* Arena */
        }

        body { background-color: var(--fondo); color: var(--texto); font-family: 'Georgia', serif; margin: 0; padding: 0; }
        
        /* Contenedores */
        .seccion { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        
        /* Cabecera */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        
        /* Botones Rubros */
        .grilla-rubros { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tarjeta-rubro { background: var(--tarjeta); border: 1px solid var(--borde); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tarjeta-rubro:hover { border-color: var(--texto); transform: translateY(-3px); }
        .tarjeta-rubro i { font-size: 28px; color: var(--texto); margin-bottom: 10px; display: block; }
        .tarjeta-rubro span { font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; }
        .leyenda { font-size: 9px; color: #7f8c8d; margin-top: 5px; text-transform: uppercase; }

        /* Simulador */
        #modulo-seguridad { display: none; }
        .btn-volver { background: none; border: 1px solid var(--texto); padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO -->
    <div id="pantalla-inicio" class="seccion">
        <div class="header">
            <h1>Data Sueldos</h1>
            <p>Simulador de sueldos. Fácil, rápido y sencillo.</p>
        </div>

        <div class="grilla-rubros">
            <!-- BOTÓN ACTIVO -->
            <div class="tarjeta-rubro" onclick="abrirModulo('seguridad')">
                <i class="fa-solid fa-shield-halved"></i> <span>Seguridad Privada</span>
            </div>
            
            <!-- BOTONES PRÓXIMAMENTE -->
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-cart-shopping"></i> <span>Comercio</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-utensils"></i> <span>Gastronomía</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-helmet-safety"></i> <span>Construcción</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-building-columns"></i> <span>Bancario</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-industry"></i> <span>Metalúrgicos</span>
                <div class="leyenda">Próximamente</div>
            </div>
        </div>
    </div>

    <!-- MÓDULO SEGURIDAD PRIVADA -->
    <div id="modulo-seguridad" class="seccion">
        <button class="btn-volver" onclick="irA('inicio')"><i class="fa-solid fa-arrow-left"></i> Volver</button>
        <h2>Seguridad Privada</h2>
        <!-- AQUÍ IREMOS AGREGANDO LAS ESCALAS Y EL CÁLCULO -->
        <p>Seleccioná tu antigüedad para calcular el sueldo.</p>
    </div>

    <script>
        // Navegación modular
        function abrirModulo(rubro) {
            if(rubro === 'seguridad') {
                document.getElementById('pantalla-inicio').style.display = 'none';
                document.getElementById('modulo-seguridad').style.display = 'block';
            }
        }

        function irA(seccion) {
            if(seccion === 'inicio') {
                document.getElementById('pantalla-inicio').style.display = 'block';
                document.getElementById('modulo-seguridad').style.display = 'none';
            }
        }
    </script>
</body>
</html>
