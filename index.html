<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Data Sueldos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Paleta Vintage Profesional */
        :root {
            --fondo: #f9f7f2;        /* Pergamino suave */
            --texto: #2c3e50;        /* Gris carbón profundo */
            --borde: #d1ccc0;        /* Borde envejecido */
            --acento: #8b7355;       /* Tono bronce/madera para iconos */
        }

        body { 
            background-color: var(--fondo); 
            color: var(--texto); 
            font-family: 'Times New Roman', serif; /* Fuente con estilo clásico */
            margin: 0; padding: 0; 
        }
        
        .seccion { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 50px; border-bottom: 2px solid var(--borde); padding-bottom: 20px; }
        .header h1 { font-size: 36px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .header p { font-style: italic; color: #57606f; }
        
        .grilla-rubros { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tarjeta-rubro { 
            background: #ffffff; 
            border: 1px solid var(--borde); 
            padding: 25px 15px; 
            border-radius: 4px; /* Bordes rectos para un look más clásico */
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }
        .tarjeta-rubro:hover { border-color: var(--acento); background: #fdfdfd; }
        .tarjeta-rubro i { font-size: 30px; color: var(--acento); margin-bottom: 15px; display: block; }
        .tarjeta-rubro span { font-size: 13px; font-weight: 900; text-transform: uppercase; display: block; letter-spacing: 0.5px; }
        
        .leyenda { font-size: 8px; color: #a4b0be; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        #modulo-seguridad { display: none; }
        .btn-volver { background: none; border: 1px solid var(--texto); padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="seccion">
        <div class="header">
            <h1>Data Sueldos</h1>
            <p>Simulador de haberes. Precisión y transparencia.</p>
        </div>

        <div class="grilla-rubros">
            <div class="tarjeta-rubro" onclick="abrirModulo('seguridad')">
                <i class="fa-solid fa-shield-halved"></i> <span>Seguridad Privada</span>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-cart-shopping"></i> <span>Comercio</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-utensils"></i> <span>Gastronomía</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-helmet-safety"></i> <span>Construcción</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-building-columns"></i> <span>Bancario</span>
                <div class="leyenda">Próximamente</div>
            </div>
            <div class="tarjeta-rubro">
                <i class="fa-solid fa-industry"></i> <span>Metalúrgicos</span>
                <div class="leyenda">Próximamente</div>
            </div>
        </div>
    </div>

    <div id="modulo-seguridad" class="seccion">
        <button class="btn-volver" onclick="irA('inicio')"><i class="fa-solid fa-arrow-left"></i> Volver</button>
        <h2 style="text-transform: uppercase; border-bottom: 1px solid var(--borde);">Seguridad Privada</h2>
        <p>Configuración de escala salarial en proceso...</p>
    </div>

    <script>
        function abrirModulo(rubro) {
            if(rubro === 'seguridad') {
                document.getElementById('pantalla-inicio').style.display = 'none';
                document.getElementById('modulo-seguridad').style.display = 'block';
            }
        }
        function irA(seccion) {
            if(seccion === 'inicio') {
                document.getElementById('pantalla-inicio').style.display = 'block';
                document.getElementById('modulo-seguridad').style.display = 'none';
            }
        }
    </script>
</body>
</html>
